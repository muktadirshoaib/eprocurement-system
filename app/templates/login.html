<!DOCTYPE html>
<html>
<head>
    <title>Login - E-Procurement System</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 100px auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>E-Procurement System</h1>
    <div id="error" style="color:red;"></div>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            if (res.ok) window.location = '/dashboard';
            else document.getElementById('error').textContent = 'Invalid credentials';
        }
    </script>
</body>
</html>
